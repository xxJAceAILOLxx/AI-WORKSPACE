<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" font-family="Inter, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="#1e1e2e" rx="8"/>

  <!-- Title -->
  <text x="300" y="35" fill="#cdd6f4" font-size="18" font-weight="bold" text-anchor="middle">Volume Profile Anatomy</text>

  <!-- Price axis (Y axis) -->
  <line x1="100" y1="60" x2="100" y2="450" stroke="#6c7086" stroke-width="2"/>
  <text x="85" y="65" fill="#a6adc8" font-size="12" text-anchor="end">High</text>
  <text x="85" y="255" fill="#a6adc8" font-size="12" text-anchor="end">Mid</text>
  <text x="85" y="455" fill="#a6adc8" font-size="12" text-anchor="end">Low</text>

  <!-- Volume bars (horizontal, going right) -->
  <!-- Bottom LVN -->
  <rect x="100" y="420" width="40" height="30" fill="#6c7086" rx="2"/>
  <!-- Increasing volume -->
  <rect x="100" y="390" width="80" height="30" fill="#3b82f6" opacity="0.5" rx="2"/>
  <rect x="100" y="360" width="120" height="30" fill="#3b82f6" opacity="0.6" rx="2"/>
  <rect x="100" y="330" width="180" height="30" fill="#3b82f6" opacity="0.7" rx="2"/>
  <rect x="100" y="300" width="220" height="30" fill="#3b82f6" opacity="0.8" rx="2"/>
  <!-- POC - highest bar -->
  <rect x="100" y="270" width="280" height="30" fill="#f59e0b" opacity="0.9" rx="2"/>
  <text x="385" y="290" fill="#f59e0b" font-size="13" font-weight="bold">POC</text>
  <!-- Decreasing volume -->
  <rect x="100" y="240" width="200" height="30" fill="#3b82f6" opacity="0.7" rx="2"/>
  <rect x="100" y="210" width="140" height="30" fill="#3b82f6" opacity="0.6" rx="2"/>
  <rect x="100" y="180" width="80" height="30" fill="#3b82f6" opacity="0.5" rx="2"/>
  <!-- Top LVN -->
  <rect x="100" y="150" width="30" height="30" fill="#6c7086" rx="2"/>

  <!-- Value Area bracket -->
  <line x1="420" y1="190" x2="440" y2="190" stroke="#a6e3a1" stroke-width="2"/>
  <line x1="440" y1="190" x2="440" y2="340" stroke="#a6e3a1" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="420" y1="340" x2="440" y2="340" stroke="#a6e3a1" stroke-width="2"/>
  <text x="445" y="270" fill="#a6e3a1" font-size="12" writing-mode="tb">Value Area (68-70%)</text>

  <!-- VAH label -->
  <line x1="100" y1="190" x2="395" y2="190" stroke="#a6e3a1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="300" y="185" fill="#a6e3a1" font-size="12" text-anchor="end">VAH</text>

  <!-- VAL label -->
  <line x1="100" y1="340" x2="395" y2="340" stroke="#a6e3a1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="300" y="355" fill="#a6e3a1" font-size="12" text-anchor="end">VAL</text>

  <!-- HVN label -->
  <rect x="460" y="295" width="50" height="20" fill="#3b82f6" opacity="0.3" rx="4"/>
  <text x="530" y="310" fill="#3b82f6" font-size="12">HVN</text>

  <!-- LVN label -->
  <rect x="460" y="145" width="50" height="20" fill="#6c7086" rx="4"/>
  <text x="530" y="160" fill="#6c7086" font-size="12">LVN</text>

  <!-- Legend -->
  <rect x="460" y="400" width="110" height="80" fill="#2a2a3e" rx="6"/>
  <text x="470" y="418" fill="#cdd6f4" font-size="12" font-weight="bold">Legend</text>
  <rect x="470" y="428" width="12" height="12" fill="#3b82f6" rx="2"/>
  <text x="490" y="439" fill="#a6adc8" font-size="11">Volume</text>
  <rect x="470" y="445" width="12" height="12" fill="#f59e0b" rx="2"/>
  <text x="490" y="456" fill="#a6adc8" font-size="11">POC</text>
  <rect x="470" y="462" width="12" height="12" fill="#6c7086" rx="2"/>
  <text x="490" y="473" fill="#a6adc8" font-size="11">Low Vol</text>

  <!-- Price bar on left side -->
  <rect x="106" y="65" width="8" height="385" fill="#2a2a3e" rx="2"/>
</svg>