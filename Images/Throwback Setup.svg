<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" font-family="Inter, Segoe UI, sans-serif">
  <defs>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="8" orient="auto">
      <path d="M0,0 L4,8 L8,0" fill="#f38ba8"/>
    </marker>
    <marker id="arrowUp" markerWidth="8" markerHeight="8" refX="4" refY="0" orient="auto">
      <path d="M0,8 L4,0 L8,8" fill="#a6e3a1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" fill="#1e1e2e" rx="8"/>

  <!-- Title -->
  <text x="300" y="30" fill="#cdd6f4" font-size="18" font-weight="bold" text-anchor="middle">The Throwback — Retest After Real Break</text>

  <!-- Candlestick / price path -->
  <!-- Phase 1: Balanced range -->
  <rect x="60" y="250" width="120" height="100" fill="#2a2a3e" rx="3" stroke="#6c7086" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="120" y="240" fill="#a6adc8" font-size="11" text-anchor="middle">Balance / Value</text>

  <!-- VAH line -->
  <line x1="60" y1="250" x2="550" y2="250" stroke="#a6e3a1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="120" y="245" fill="#a6e3a1" font-size="11" text-anchor="end">VAH</text>

  <!-- VAL line -->
  <line x1="60" y1="350" x2="300" y2="350" stroke="#a6e3a1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="120" y="365" fill="#a6e3a1" font-size="11" text-anchor="end">VAL</text>

  <!-- Phase 2: Violent break down -->
  <path d="M160,300 L200,300 L220,240 L240,180 L260,170 L280,175 L300,180" fill="none" stroke="#f38ba8" stroke-width="3" stroke-linejoin="round"/>

  <!-- Phase 3: Retest back to VAL -->
  <path d="M300,180 L330,200 L350,240 L370,260 L380,250" fill="none" stroke="#f38ba8" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Phase 4: Rejection at VAL - continuation -->
  <path d="M380,250 L400,240 L430,200 L470,160 L520,140 L560,130" fill="none" stroke="#f38ba8" stroke-width="3"/>

  <!-- Entry arrow at retest -->
  <line x1="380" y1="250" x2="380" y2="180" stroke="#f9e2af" stroke-width="2" marker-end="url(#arrowDown)"/>
  <text x="390" y="215" fill="#f9e2af" font-size="12" font-weight="bold">Entry on retest</text>

  <!-- Stop loss zone -->
  <line x1="355" y1="260" x2="355" y2="280" stroke="#f38ba8" stroke-width="3"/>
  <text x="325" y="275" fill="#f38ba8" font-size="11" text-anchor="end">Stop</text>

  <!-- TP -->
  <line x1="470" y1="160" x2="470" y2="140" stroke="#a6e3a1" stroke-width="3"/>
  <text x="475" y="145" fill="#a6e3a1" font-size="11">TP</text>

  <!-- Labels for each phase -->
  <text x="120" y="410" fill="#6c7086" font-size="12" font-weight="bold" text-anchor="middle">① Range</text>
  <text x="230" y="410" fill="#f38ba8" font-size="12" font-weight="bold" text-anchor="middle">② Break</text>
  <text x="350" y="410" fill="#f9e2af" font-size="12" font-weight="bold" text-anchor="middle">③ Retest</text>
  <text x="490" y="410" fill="#a6e3a1" font-size="12" font-weight="bold" text-anchor="middle">④ Continuation</text>

  <!-- Volume bars below -->
  <rect x="60" y="430" width="140" height="20" fill="#3b82f6" opacity="0.4" rx="2"/>
  <text x="130" y="445" fill="#6c7086" font-size="10" text-anchor="middle">Low vol (range)</text>

  <rect x="200" y="430" width="120" height="40" fill="#f38ba8" opacity="0.7" rx="2"/>
  <text x="260" y="455" fill="#f38ba8" font-size="10" text-anchor="middle">High vol (break)</text>

  <rect x="320" y="430" width="80" height="20" fill="#3b82f6" opacity="0.4" rx="2"/>
  <text x="360" y="445" fill="#6c7086" font-size="10" text-anchor="middle">Low vol (retest)</text>

  <rect x="400" y="430" width="150" height="30" fill="#f38ba8" opacity="0.5" rx="2"/>
  <text x="475" y="445" fill="#f38ba8" font-size="10" text-anchor="middle">Med vol (continuation)</text>
</svg>